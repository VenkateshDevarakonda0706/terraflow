apiVersion: apps/v1
kind: Deployment
metadata:
  name: terraflow-api-deployment
  namespace: terraflow
  labels:
    app: terraflow-api
spec:
  replicas: 4
  selector:
    matchLabels:
      app: terraflow-api
  template:
    metadata:
      labels:
        app: terraflow-api
    spec:
      containers:
      - name: terraflow-api
        image: terraflow/api-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4000
        envFrom:
        - secretRef:
            name: terraflow-secrets
        resources:
          limits:
            cpu: "1000m"
            memory: "1024Mi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 4000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: terraflow-api-service
  namespace: terraflow
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 4000
    protocol: TCP
  selector:
    app: terraflow-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: terraflow-api-hpa
  namespace: terraflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: terraflow-api-deployment
  minReplicas: 4
  maxReplicas: 24
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
