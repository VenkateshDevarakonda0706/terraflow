version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: terraflow-postgres
    environment:
      POSTGRES_USER: terraflow_admin
      POSTGRES_PASSWORD: terraflow_secure_pass_10M
      POSTGRES_DB: terraflow_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terraflow_admin -d terraflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: terraflow-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
